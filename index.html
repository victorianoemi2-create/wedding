<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Devin & Victoria's Wedding · August 4, 2028</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=Great+Vibes&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Jost', sans-serif; }
.hero { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: url('Header_Image.png') center center / cover no-repeat; animation: slowZoom 18s ease-in-out infinite alternate; }
@keyframes slowZoom { from { transform: scale(1.0); } to { transform: scale(1.06); } }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,12,24,0.42) 0%, rgba(8,12,24,0.18) 45%, rgba(8,12,24,0.62) 100%); }
.hero-content { position: relative; z-index: 2; text-align: center; padding: 0 24px; animation: fadeUp 1.6s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
.invited-tag { font-size: 11px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; color: rgba(255,255,255,0.72); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 16px; }
.invited-tag::before, .invited-tag::after { content: ''; width: 48px; height: 1px; background: rgba(201,168,76,0.6); }
.name-devin, .name-victoria { font-family: 'Cormorant Garamond', serif; font-size: clamp(80px, 14vw, 160px); font-weight: 300; color: #ffffff; letter-spacing: -3px; line-height: 0.88; display: block; }
.name-amp { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5vw, 60px); font-style: italic; color: rgba(232,213,160,0.9); letter-spacing: 2px; display: inline-block; margin: 4px 0; }
.name-possessive { font-size: 0.55em; font-style: italic; color: rgba(232,213,160,0.8); }
.wedding-script { font-family: 'Great Vibes', cursive; font-size: clamp(52px, 8vw, 100px); color: rgba(232,213,160,0.92); line-height: 1; margin-top: -6px; display: block; animation: fadeUp 1.6s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
.hero-divider { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 28px 0 20px; animation: fadeUp 1.6s 0.5s cubic-bezier(0.22,1,0.36,1) both; }
.hero-divider::before, .hero-divider::after { content: ''; width: 64px; height: 1px; background: rgba(201,168,76,0.45); }
.hero-divider span { color: rgba(201,168,76,0.7); font-size: 14px; }
.hero-date { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; color: rgba(255,255,255,0.65); letter-spacing: 3px; margin-bottom: 48px; animation: fadeUp 1.6s 0.6s cubic-bezier(0.22,1,0.36,1) both; }
.cta-btn { display: inline-block; padding: 16px 60px; border: 1px solid rgba(255,255,255,0.55); color: #fff; font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; text-decoration: none; background: rgba(255,255,255,0.06); transition: all 0.35s ease; animation: fadeUp 1.6s 0.8s cubic-bezier(0.22,1,0.36,1) both; }
.cta-btn:hover { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.8); color: rgba(232,213,160,1); }
.scroll-hint { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; animation: hintFade 1s 2.4s ease forwards; pointer-events: none; }
@keyframes hintFade { to { opacity: 0.45; } }
.scroll-hint span { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
.scroll-hint .arrow { width: 1px; height: 32px; background: linear-gradient(to bottom, rgba(201,168,76,0.6), transparent); animation: arrowPulse 1.8s 2.4s ease-in-out infinite; }
@keyframes arrowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="invited-tag">You are cordially invited to</p>
    <div class="names-block">
      <span class="name-devin">DEVIN</span>
      <span class="name-amp">&</span>
      <span class="name-victoria">VICTORIA<span class="name-possessive">'s</span></span>
      <span class="wedding-script">Wedding</span>
    </div>
    <div class="hero-divider"><span>✦</span></div>
    <p class="hero-date">August 4, 2028 · Tampa, Florida</p>
    <a href="wedding.html" class="cta-btn">Love Begins Here</a>
  </div>
  <div class="scroll-hint"><span>Enter</span><div class="arrow"></div></div>
</div>
</body>
</html>
